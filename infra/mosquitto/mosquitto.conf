# Mosquitto 2.x denies anonymous access and binds to loopback by default.
# This demo broker accepts anonymous connections on all interfaces; device
# authentication (credentials/ACLs or mTLS) is on the roadmap.
listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
