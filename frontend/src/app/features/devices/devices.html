<div class="page">
  <h1 class="page-title">Devices</h1>

  <mat-card class="surface-card table-card">
    <table mat-table [dataSource]="devices()" class="device-table">
      <ng-container matColumnDef="deviceId">
        <th mat-header-cell *matHeaderCellDef>Device</th>
        <td mat-cell *matCellDef="let d">{{ d.deviceId }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let d">{{ d.name }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let d">{{ d.type }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let d"><app-status-chip [status]="d.status" /></td>
      </ng-container>

      <ng-container matColumnDef="speed">
        <th mat-header-cell *matHeaderCellDef>Speed</th>
        <td mat-cell *matCellDef="let d">{{ speed(d) }}</td>
      </ng-container>

      <ng-container matColumnDef="battery">
        <th mat-header-cell *matHeaderCellDef>Battery</th>
        <td mat-cell *matCellDef="let d">{{ battery(d) }}</td>
      </ng-container>

      <ng-container matColumnDef="lastSeen">
        <th mat-header-cell *matHeaderCellDef>Last seen</th>
        <td mat-cell *matCellDef="let d" class="text-muted-soft">{{ lastSeen(d) }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns" class="clickable" (click)="open(row)"></tr>
    </table>

    @if (!devices().length) {
      <p class="empty text-muted-soft">No devices registered yet.</p>
    }
  </mat-card>
</div>
