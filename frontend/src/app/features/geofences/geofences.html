<div class="page">
  <div class="header">
    <h1 class="page-title m-0">Geofences</h1>
    <button mat-flat-button color="primary" (click)="create()">
      <mat-icon>add</mat-icon>
      New geofence
    </button>
  </div>

  <mat-card class="surface-card table-card">
    <table mat-table [dataSource]="geofences()" class="geofence-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let g">{{ g.name }}</td>
      </ng-container>

      <ng-container matColumnDef="center">
        <th mat-header-cell *matHeaderCellDef>Center</th>
        <td mat-cell *matCellDef="let g" class="text-muted-soft">{{ center(g) }}</td>
      </ng-container>

      <ng-container matColumnDef="radius">
        <th mat-header-cell *matHeaderCellDef>Radius</th>
        <td mat-cell *matCellDef="let g">{{ g.radiusM }} m</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let g" class="actions-col">
          <button mat-icon-button (click)="edit(g)" aria-label="Edit geofence">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="remove(g)" aria-label="Delete geofence">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    @if (!geofences().length) {
      <p class="empty text-muted-soft">No geofences defined yet.</p>
    }
  </mat-card>
</div>
