<div class="page">
  <div class="header">
    <h1 class="page-title m-0">Alerts</h1>
    <mat-button-toggle-group
      [value]="filter()"
      (change)="setFilter($event.value)"
      aria-label="Filter by status"
    >
      <mat-button-toggle value="ALL">All</mat-button-toggle>
      <mat-button-toggle value="ACTIVE">Active</mat-button-toggle>
      <mat-button-toggle value="ACKNOWLEDGED">Acknowledged</mat-button-toggle>
      <mat-button-toggle value="RESOLVED">Resolved</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <mat-card class="surface-card table-card">
    <table mat-table [dataSource]="alerts()" class="alert-table">
      <ng-container matColumnDef="severity">
        <th mat-header-cell *matHeaderCellDef>Severity</th>
        <td mat-cell *matCellDef="let a"><app-severity-chip [severity]="a.severity" /></td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let a">{{ a.status }}</td>
      </ng-container>

      <ng-container matColumnDef="device">
        <th mat-header-cell *matHeaderCellDef>Device</th>
        <td mat-cell *matCellDef="let a">{{ a.deviceId }}</td>
      </ng-container>

      <ng-container matColumnDef="message">
        <th mat-header-cell *matHeaderCellDef>Message</th>
        <td mat-cell *matCellDef="let a">{{ a.message }}</td>
      </ng-container>

      <ng-container matColumnDef="created">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let a" class="text-muted-soft">{{ created(a.createdAt) }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let a" class="actions-col">
          @if (a.status === 'ACTIVE') {
            <button mat-stroked-button (click)="acknowledge(a)">Acknowledge</button>
          }
          @if (a.status !== 'RESOLVED') {
            <button mat-flat-button color="primary" (click)="resolve(a)">Resolve</button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    @if (!alerts().length) {
      <p class="empty text-muted-soft">No alerts match this filter.</p>
    }
  </mat-card>
</div>
