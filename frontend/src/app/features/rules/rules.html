<div class="page">
  <div class="header">
    <h1 class="page-title m-0">Alert rules</h1>
    <button mat-flat-button color="primary" (click)="create()">
      <mat-icon>add</mat-icon>
      New rule
    </button>
  </div>

  <mat-card class="surface-card table-card">
    <table mat-table [dataSource]="rules()" class="rule-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let r">{{ r.name }}</td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let r">{{ r.type }}</td>
      </ng-container>

      <ng-container matColumnDef="condition">
        <th mat-header-cell *matHeaderCellDef>Condition</th>
        <td mat-cell *matCellDef="let r" class="text-muted-soft">{{ condition(r) }}</td>
      </ng-container>

      <ng-container matColumnDef="severity">
        <th mat-header-cell *matHeaderCellDef>Severity</th>
        <td mat-cell *matCellDef="let r"><app-severity-chip [severity]="r.severity" /></td>
      </ng-container>

      <ng-container matColumnDef="enabled">
        <th mat-header-cell *matHeaderCellDef>Enabled</th>
        <td mat-cell *matCellDef="let r">{{ r.enabled ? 'Yes' : 'No' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-col">Actions</th>
        <td mat-cell *matCellDef="let r" class="actions-col">
          <button mat-icon-button (click)="edit(r)" aria-label="Edit rule">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="remove(r)" aria-label="Delete rule">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    @if (!rules().length) {
      <p class="empty text-muted-soft">No rules defined yet.</p>
    }
  </mat-card>
</div>
