spring:
  application:
    name: fleet-telemetry-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:fleet}?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:fleet}
    password: ${MYSQL_PASSWORD:fleet}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:fleet}
    password: ${RABBITMQ_PASSWORD:fleet}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        prefetch: 20
        concurrency: 2
        max-concurrency: 8
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 1s
          multiplier: 2.0
          max-interval: 10s
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

fleet:
  mqtt:
    url: ${MQTT_URL:tcp://localhost:1883}
    client-id: ${MQTT_CLIENT_ID:fleet-backend}
    telemetry-topic: fleet/+/telemetry
    status-topic: fleet/+/status
    qos: 1
  alerting:
    offline-threshold: PT45S
    offline-check-interval: PT15S

logging:
  pattern:
    correlation: "[%X{correlationId:-}] "
  level:
    net.rafaelinfante.fleet: INFO
